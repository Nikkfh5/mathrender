<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none';
               style-src 'unsafe-inline' https://cdn.jsdelivr.net;
               script-src 'unsafe-inline' https://cdn.jsdelivr.net;
               font-src https://cdn.jsdelivr.net;
               connect-src https://cdn.jsdelivr.net;">
<title>MathRender</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
  /* Dark theme (default) */
  :root, body.vscode-dark, body.vscode-high-contrast {
    --bg-primary: #0a0a0f;
    --bg-card: #12121a;
    --bg-card-hover: #16161f;
    --bg-code: #1a1a25;
    --border: #1e1e2e;
    --text-primary: #e2e2e8;
    --text-secondary: #9090a0;
    --text-dim: #3a3a4a;
    --accent: #7c6aef;
    --accent-dim: rgba(124, 106, 239, 0.1);
    --accent-glow: rgba(124, 106, 239, 0.15);
    --scrollbar-thumb: #2a2a3a;
    --strong-color: #fff;
    --copy-bg: rgba(255,255,255,0.06);
    --copy-bg-hover: rgba(255,255,255,0.12);
    --search-bg: #12121a;
  }

  /* Light theme */
  body.vscode-light {
    --bg-primary: #ffffff;
    --bg-card: #f8f8fa;
    --bg-card-hover: #f0f0f4;
    --bg-code: #f0f0f5;
    --border: #e0e0e6;
    --text-primary: #1a1a2e;
    --text-secondary: #5a5a72;
    --text-dim: #a0a0b0;
    --accent: #6b57e0;
    --accent-dim: rgba(107, 87, 224, 0.08);
    --accent-glow: rgba(107, 87, 224, 0.12);
    --scrollbar-thumb: #c8c8d4;
    --strong-color: #000;
    --copy-bg: rgba(0,0,0,0.04);
    --copy-bg-hover: rgba(0,0,0,0.08);
    --search-bg: #f8f8fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  /* Header */
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg-primary);
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: white;
  }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
  .logo-version { font-size: 11px; color: var(--text-dim); font-weight: 400; }

  .header-controls { display: flex; align-items: center; gap: 8px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2a9d4e;
    box-shadow: 0 0 6px rgba(42, 157, 78, 0.5);
    animation: pulse-dot 3s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { background: var(--bg-card); color: var(--text-primary); }

  /* Search bar */
  .search-bar {
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: none;
  }
  .search-bar.visible { display: block; }
  .search-input {
    width: 100%;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--search-bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  /* Feed */
  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    scroll-behavior: smooth;
  }

  /* Response card */
  .response-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 16px;
    animation: slide-in 0.3s ease-out;
    transition: border-color 0.2s ease;
    position: relative;
  }
  .response-card.fresh {
    animation: glow-fade 2s ease-out forwards;
  }
  .response-card.hidden { display: none; }
  @keyframes slide-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glow-fade {
    from { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    to { border-color: var(--border); box-shadow: none; }
  }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .response-time {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .copy-btn {
    padding: 3px 8px;
    border: none;
    border-radius: 4px;
    background: var(--copy-bg);
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s ease;
    opacity: 0;
  }
  .response-card:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--copy-bg-hover); color: var(--text-secondary); }
  .copy-btn.copied { color: #2a9d4e; }
  mark { background: rgba(124, 106, 239, 0.3); color: inherit; border-radius: 2px; padding: 0 1px; }

  /* Markdown content */
  .response-body { line-height: 1.7; font-size: 15px; }

  .response-body h1, .response-body h2, .response-body h3 {
    margin: 20px 0 10px 0;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .response-body h1 { font-size: 20px; }
  .response-body h2 { font-size: 17px; }
  .response-body h3 { font-size: 15px; color: var(--text-secondary); }

  .response-body p { margin: 8px 0; }

  .response-body strong { font-weight: 600; color: var(--strong-color); }
  .response-body em { font-style: italic; color: var(--text-secondary); }

  .response-body ul, .response-body ol {
    margin: 8px 0;
    padding-left: 24px;
  }
  .response-body li { margin: 4px 0; }

  .response-body code {
    background: var(--bg-code);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .response-body pre {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin: 12px 0;
    overflow-x: auto;
  }
  .response-body pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .response-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .response-body table {
    border-collapse: collapse;
    margin: 12px 0;
    width: 100%;
    font-size: 14px;
  }
  .response-body th, .response-body td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .response-body th {
    background: var(--bg-code);
    font-weight: 600;
  }

  /* KaTeX display math */
  .math-display {
    background: var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin: 14px 0;
    overflow-x: auto;
  }
  .math-display .katex { font-size: 1.25em; }

  /* KaTeX inline math */
  .math-inline .katex { font-size: 1.05em; }

  /* KaTeX error */
  .katex-error {
    color: #e05555;
    font-size: 13px;
    font-family: 'Cascadia Code', 'SF Mono', monospace;
  }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { font-size: 14px; text-align: center; line-height: 1.6; }

  /* Counter */
  .counter {
    font-size: 11px; color: var(--text-dim);
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    text-align: center; flex-shrink: 0;
  }
</style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">&sum;</div>
      <span class="logo-text">MathRender <span class="logo-version">v2</span></span>
    </div>
    <div class="header-controls">
      <div class="status-dot" id="statusDot"></div>
      <button class="btn" onclick="toggleSearch()" id="searchBtn" title="Ctrl+F">Search</button>
      <button class="btn" onclick="exportTex()">Export</button>
      <button class="btn" onclick="togglePause()" id="pauseBtn">Pause</button>
      <button class="btn" onclick="clearFeed()">Clear</button>
    </div>
  </header>

  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="Search formulas and text...">
  </div>

  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&int;</div>
      <div class="empty-text">
        Ответы Claude с формулами появятся здесь автоматически
      </div>
    </div>
  </div>

  <div class="counter" id="counter"></div>

<script>
const vscode = acquireVsCodeApi();
const feed = document.getElementById('feed');
const emptyState = document.getElementById('emptyState');
const counter = document.getElementById('counter');
const pauseBtn = document.getElementById('pauseBtn');
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
let responseCount = 0;
let autoScroll = true;
let paused = false;

const DEFAULT_MACROS = {
  "\\R": "\\mathbb{R}", "\\N": "\\mathbb{N}",
  "\\Z": "\\mathbb{Z}", "\\C": "\\mathbb{C}", "\\Q": "\\mathbb{Q}",
};
let userMacros = {};

// Store raw text for search + copy
const cardData = new WeakMap();

function sanitizeHtml(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('script, iframe, object, embed, form').forEach(el => el.remove());
  div.querySelectorAll('*').forEach(el => {
    for (const attr of [...el.attributes]) {
      if (attr.name.startsWith('on')) {
        el.removeAttribute(attr.name);
      } else if (attr.name === 'href' && attr.value.trim().toLowerCase().startsWith('javascript:')) {
        el.removeAttribute(attr.name);
      }
    }
  });
  return div.innerHTML;
}

// Marked config
marked.setOptions({
  breaks: true,
  gfm: true,
});

function renderMathInText(text) {
  const codeBlocks = [];
  text = text.replace(/```[\s\S]*?```/g, (m) => {
    codeBlocks.push(m);
    return `%%CODEBLOCK_${codeBlocks.length - 1}%%`;
  });
  text = text.replace(/`[^`]+`/g, (m) => {
    codeBlocks.push(m);
    return `%%CODEBLOCK_${codeBlocks.length - 1}%%`;
  });

  const displayMaths = [];
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, latex) => {
    displayMaths.push(latex.trim());
    return `%%DISPLAYMATH_${displayMaths.length - 1}%%`;
  });

  const inlineMaths = [];
  text = text.replace(/(?<!\$)\$(?!\$)([^$]+?)\$(?!\$)/g, (_, latex) => {
    inlineMaths.push(latex.trim());
    return `%%INLINEMATH_${inlineMaths.length - 1}%%`;
  });

  text = text.replace(/%%CODEBLOCK_(\d+)%%/g, (_, i) => codeBlocks[parseInt(i)]);

  let html = sanitizeHtml(marked.parse(text));

  html = html.replace(/%%DISPLAYMATH_(\d+)%%/g, (_, i) => {
    const latex = displayMaths[parseInt(i)];
    return renderKatex(latex, true);
  });

  html = html.replace(/%%INLINEMATH_(\d+)%%/g, (_, i) => {
    const latex = inlineMaths[parseInt(i)];
    return renderKatex(latex, false);
  });

  return html;
}

function renderKatex(latex, displayMode) {
  try {
    const html = katex.renderToString(latex, {
      displayMode: displayMode,
      throwOnError: false,
      strict: 'warn',
      trust: false,
      macros: { ...DEFAULT_MACROS, ...userMacros },
    });
    if (displayMode) {
      return `<div class="math-display">${html}</div>`;
    }
    return `<span class="math-inline">${html}</span>`;
  } catch (e) {
    return `<span class="katex-error">${escapeHtml(latex)}</span>`;
  }
}

function escapeHtml(s) {
  const p = document.createElement('p');
  p.textContent = s;
  return p.innerHTML;
}

function updatePauseUI(isPaused) {
  pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
  pauseBtn.style.borderColor = isPaused ? '#d44' : '';
  pauseBtn.style.color = isPaused ? '#d44' : '';
}

function resetFeed() {
  feed.innerHTML = '';
  feed.appendChild(emptyState);
  emptyState.style.display = '';
  responseCount = 0;
  updateCounter();
}

function togglePause() {
  paused = !paused;
  updatePauseUI(paused);
  vscode.postMessage({ command: paused ? 'pause' : 'resume' });
}

// --- Search ---
function toggleSearch() {
  searchBar.classList.toggle('visible');
  if (searchBar.classList.contains('visible')) {
    searchInput.focus();
  } else {
    searchInput.value = '';
    filterCards('');
    feed.querySelectorAll('.response-body').forEach(b => clearHighlights(b));
  }
}

let filterTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(() => filterCards(searchInput.value.toLowerCase()), 150);
});

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    toggleSearch();
  }
  if (e.key === 'Escape' && searchBar.classList.contains('visible')) {
    toggleSearch();
  }
});

function filterCards(query) {
  const cards = feed.querySelectorAll('.response-card');
  let visible = 0;
  cards.forEach(card => {
    const raw = cardData.get(card) || '';
    const body = card.querySelector('.response-body');
    if (!query || raw.toLowerCase().includes(query)) {
      card.classList.remove('hidden');
      visible++;
      // Highlight matches
      if (body && query) {
        highlightText(body, query);
      } else if (body) {
        clearHighlights(body);
      }
    } else {
      card.classList.add('hidden');
    }
  });
  emptyState.style.display = (visible === 0 && responseCount > 0) ? '' : 'none';
}

function highlightText(el, query) {
  clearHighlights(el);
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const matches = [];
  while (walker.nextNode()) {
    const node = walker.currentNode;
    const idx = node.textContent.toLowerCase().indexOf(query);
    if (idx >= 0) matches.push({ node, idx });
  }
  matches.forEach(({ node, idx }) => {
    const range = document.createRange();
    range.setStart(node, idx);
    range.setEnd(node, idx + query.length);
    const mark = document.createElement('mark');
    range.surroundContents(mark);
  });
}

function clearHighlights(el) {
  el.querySelectorAll('mark').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
}

// --- Export ---
function exportTex() {
  vscode.postMessage({ command: 'export' });
}

// --- Copy ---
function copySource(btn) {
  const card = btn.closest('.response-card');
  const raw = cardData.get(card) || '';
  navigator.clipboard.writeText(raw).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 1500);
  }).catch(() => {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}


function addResponse(data) {
  emptyState.style.display = 'none';

  const card = document.createElement('div');
  card.className = 'response-card fresh';

  // Store raw text for search + copy
  const rawText = data.text || '';
  cardData.set(card, rawText);

  // Header: timestamp + copy button
  const hdr = document.createElement('div');
  hdr.className = 'response-header';

  const time = document.createElement('div');
  time.className = 'response-time';
  time.textContent = data.timestamp || new Date().toLocaleTimeString('ru-RU');
  hdr.appendChild(time);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'Copy';
  copyBtn.onclick = function() { copySource(this); };
  hdr.appendChild(copyBtn);


  card.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'response-body';
  body.innerHTML = renderMathInText(rawText);
  card.appendChild(body);

  feed.appendChild(card);
  responseCount++;
  updateCounter();

  setTimeout(() => card.classList.remove('fresh'), 2000);

  if (autoScroll) {
    feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
  }
}

feed.addEventListener('scroll', () => {
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  autoScroll = atBottom;
});

function addFormulaGroup(data) {
  let parsed = data;
  if (typeof data.text === 'string' && data.type === 'formulas') {
    try { parsed = JSON.parse(data.text); } catch (e) { /* ignore */ }
  }
  const text = (parsed.context ? parsed.context + '\n\n' : '') +
    (parsed.formulas || []).map(f => `$$${f}$$`).join('\n\n');
  addResponse({ text, timestamp: data.timestamp });
}

function clearFeed() {
  vscode.postMessage({ command: 'clear' });
  resetFeed();
  searchInput.value = '';
  searchBar.classList.remove('visible');
}

function updateCounter() {
  counter.textContent = responseCount > 0
    ? `${responseCount} ${pluralize(responseCount, 'ответ', 'ответа', 'ответов')} за сессию`
    : '';
}

function pluralize(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m100 >= 11 && m100 <= 19) return many;
  if (m10 === 1) return one;
  if (m10 >= 2 && m10 <= 4) return few;
  return many;
}

// Receive messages from VS Code extension
window.addEventListener('message', event => {
  const data = event.data;
  switch (data.type) {
    case 'response':
      addResponse(data);
      break;
    case 'formulas':
      addFormulaGroup(data);
      break;
    case 'clear':
      resetFeed();
      break;
    case 'history':
      (data.entries || []).forEach(entry => {
        if (entry.type === 'response') addResponse(entry);
        else if (entry.type === 'formulas') addFormulaGroup(entry);
      });
      break;
    case 'paused':
      paused = data.paused;
      updatePauseUI(paused);
      break;
    case 'config':
      if (data.macros) userMacros = data.macros;
      break;
  }
});

updateCounter();
</script>
</body>
</html>
